<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tu sorpresa 💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #ffe4ec, #fff8f5);
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      text-align:center;
    }

    .card{
      background: white;
      padding:30px;
      border-radius:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.1);
      max-width:500px;
    }

    h1{
      color:#d14d72;
      margin-bottom:10px;
    }

    #countdown{
      font-size:28px;
      color:#d14d72;
      font-weight:bold;
      margin-top:15px;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Tu sorpresa aún no se puede abrir 💖</h1>
    <p>Falta muy poquito para tu regalo, Belén ✨</p>

    <div id="countdown"></div>
  </div>

  <script>
    const fechaObjetivo = new Date("2026-03-24T00:00:00-03:00");

    function actualizarCuenta() {
      const ahora = new Date();
      const diferencia = fechaObjetivo - ahora;

      if (diferencia <= 0) {
        document.getElementById("countdown").innerHTML = "La sorpresa ya está lista 💕";
        return;
      }

      const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
      const horas = Math.floor((diferencia / (1000 * 60 * 60)) % 24);
      const minutos = Math.floor((diferencia / (1000 * 60)) % 60);
      const segundos = Math.floor((diferencia / 1000) % 60);

      document.getElementById("countdown").innerHTML =
        dias + " días<br>" +
        horas + "h " +
        minutos + "m " +
        segundos + "s";
    }

    actualizarCuenta();
    setInterval(actualizarCuenta, 1000);
  </script>

</body>
</html>
